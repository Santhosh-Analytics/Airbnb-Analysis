<!DOCTYPE html>
<html>
<head>
    <title>ML Prediction App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .container { max-width: 600--json url --jq '.url'px; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="mb-4">ML Prediction App</h1>
        
        <form method="post" action="/predict">
            <div class="form-group">
                <label for="feature1">Feature 1:</label>
                <input type="number" step="any" class="form-control" id="feature1" name="feature1" required>
            </div>
            
            <div class="form-group">
                <label for="feature2">Feature 2:</label>
                <input type="number" step="any" class="form-control" id="feature2" name="feature2" required>
            </div>
            
            <div class="form-group">
                <label for="feature3">Feature 3:</label>
                <input type="number" step="any" class="form-control" id="feature3" name="feature3" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Predict</button>
        </form>
        
        <hr>
        <p>Or use the API: <code>POST /api/predict</code> with JSON data</p>
    </div>
</body>
</html>
